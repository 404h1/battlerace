<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BattleRace</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; overflow: hidden;
            background: linear-gradient(#78d7ff 0%, #9be8ff 45%, #b8f5d6 100%);
            font-family: 'Arial', sans-serif; touch-action: none;
        }

        #ui-layer {
            position: absolute; top: 14px; left: 14px;
            color: white; z-index: 10;
            min-width: 170px; padding: 12px 14px;
            background: linear-gradient(145deg, rgba(16,25,44,0.82), rgba(22,38,64,0.66));
            border: 1px solid rgba(255,255,255,0.24);
            border-radius: 8px;
            box-shadow: 0 14px 36px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.18);
            backdrop-filter: blur(10px);
        }
        #ui-layer h2 { margin: 0 0 8px; font-size: 24px; letter-spacing: 0; }
        #ui-stats { display: grid; gap: 6px; font-size: 13px; line-height: 1.3; }
        #ui-stats div {
            display: flex; justify-content: space-between; gap: 14px;
            padding: 5px 8px; border-radius: 6px;
            background: rgba(255,255,255,0.12);
        }
        #status-msg {
            color: #16110a; font-weight: bold; display: none; margin-top: 8px;
            padding: 7px 9px; border-radius: 6px; font-size: 13px;
            background: linear-gradient(90deg, #ffe66d, #ff9f43);
            box-shadow: 0 0 18px rgba(255,214,64,0.45);
            animation: warningPulse 0.55s ease-in-out infinite alternate;
        }

        #touch-hint {
            display: none;
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.9); font-size: 13px; z-index: 10;
            padding: 9px 14px; border-radius: 999px;
            background: rgba(11,18,32,0.42);
            border: 1px solid rgba(255,255,255,0.18);
            text-shadow: 1px 1px 2px #000;
            backdrop-filter: blur(8px);
        }

        #item-toast {
            position: absolute; top: 18px; left: 50%;
            transform: translate(-50%, -18px) scale(0.96);
            z-index: 15; min-width: 240px; max-width: min(360px, calc(100vw - 32px));
            padding: 12px 16px; border-radius: 8px;
            color: #fff; text-align: center;
            background: linear-gradient(135deg, rgba(11,18,32,0.92), rgba(32,47,74,0.82));
            border: 1px solid rgba(255,255,255,0.28);
            box-shadow: 0 18px 42px rgba(0,0,0,0.32), 0 0 28px rgba(35,213,255,0.25);
            opacity: 0; pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
            backdrop-filter: blur(12px);
        }
        #item-toast.show { opacity: 1; transform: translate(-50%, 0) scale(1); }
        #item-toast.firework { box-shadow: 0 18px 42px rgba(0,0,0,0.32), 0 0 34px rgba(255,209,102,0.55); }
        #item-toast.confuse { box-shadow: 0 18px 42px rgba(0,0,0,0.32), 0 0 34px rgba(174,91,255,0.55); }
        #item-toast-title { font-size: 17px; font-weight: 800; margin-bottom: 3px; }
        #item-toast-desc { font-size: 13px; color: rgba(255,255,255,0.78); }

        #game-over {
            display: none;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; color: white;
            background: linear-gradient(145deg, rgba(13,20,34,0.96), rgba(31,40,62,0.94));
            padding: 28px 36px; border-radius: 8px; z-index: 20;
            width: 340px; max-height: 92vh; overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 24px 70px rgba(0,0,0,0.42);
        }
        #game-over h1 { color: #ff4757; margin: 0 0 2px; font-size: 28px; }
        #score-display { font-size: 20px; margin: 4px 0 2px; }
        #personal-best-notice { font-size: 13px; color: #aaa; margin-bottom: 10px; min-height: 18px; }
        #personal-best-notice.new-record { color: #ffd700; font-weight: bold; }

        #name-row { display: flex; justify-content: center; gap: 8px; margin: 10px 0 4px; }
        #name-input {
            padding: 8px 12px; font-size: 15px; border-radius: 6px;
            border: none; width: 170px; text-align: center;
        }
        #submit-btn {
            padding: 8px 16px; font-size: 15px; cursor: pointer;
            background-color: #ff4757; color: white;
            border: none; border-radius: 6px; white-space: nowrap;
        }
        #submit-btn:disabled { background-color: #555; cursor: not-allowed; }
        #submit-msg { font-size: 13px; color: #aaa; min-height: 18px; margin-bottom: 6px; }

        #my-rank-banner {
            display: none;
            background: rgba(255,215,0,0.15); border: 1px solid #ffd700;
            border-radius: 8px; padding: 8px 12px; margin-bottom: 10px;
            font-size: 14px; color: #ffd700; font-weight: bold;
        }

        #ranking-section h3 { color: #ffd700; margin: 10px 0 6px; font-size: 15px; }
        #ranking-list { list-style: none; padding: 0; margin: 0; }
        #ranking-list li {
            display: flex; align-items: center;
            padding: 5px 6px; border-radius: 5px; font-size: 13px;
        }
        #ranking-list li:nth-child(odd) { background: rgba(255,255,255,0.05); }
        #ranking-list li.my-score { color: #ffd700; font-weight: bold; background: rgba(255,215,0,0.1); }
        .rank-pos { width: 28px; flex-shrink: 0; }
        .rank-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin: 0 6px; }
        .rank-score { width: 56px; text-align: right; flex-shrink: 0; }

        #retry-btn {
            padding: 10px 28px; font-size: 15px; cursor: pointer;
            background-color: #2ed573; color: white;
            border: none; border-radius: 6px; margin-top: 14px; width: 100%;
        }

        @keyframes warningPulse {
            from { transform: translateX(-1px); filter: brightness(1); }
            to { transform: translateX(1px); filter: brightness(1.16); }
        }

        @media (max-width: 560px) {
            #ui-layer { top: 10px; left: 10px; min-width: 152px; padding: 10px; }
            #ui-layer h2 { font-size: 20px; }
            #game-over { width: calc(100vw - 28px); padding: 24px 20px; }
            #name-row { flex-direction: column; }
            #name-input { width: 100%; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h2>점수: <span id="score">0</span></h2>
        <div id="ui-stats">
            <div>최고: <span id="ui-best">0</span></div>
            <div>속도: <span id="ui-speed">1</span>단계</div>
        </div>
        <div id="status-msg">⚠️ 조작 반전! ⚠️</div>
    </div>

    <div id="touch-hint">◀ 왼쪽 탭 &nbsp;|&nbsp; 오른쪽 탭 ▶</div>

    <div id="item-toast">
        <div id="item-toast-title"></div>
        <div id="item-toast-desc"></div>
    </div>

    <div id="game-over">
        <h1>충돌!</h1>
        <div id="score-display">내 점수: <strong><span id="final-score">0</span></strong></div>
        <div id="personal-best-notice"></div>

        <div id="my-rank-banner"></div>

        <div id="name-row">
            <input id="name-input" type="text" maxlength="20" placeholder="닉네임" />
            <button id="submit-btn" onclick="submitScore()">등록</button>
        </div>
        <div id="submit-msg"></div>

        <div id="ranking-section">
            <h3>🏆 글로벌 랭킹 TOP 10</h3>
            <ul id="ranking-list"><li style="text-align:center;color:#666;padding:10px;">불러오는 중...</li></ul>
        </div>

        <button id="retry-btn" onclick="location.reload()">다시 도전하기</button>
    </div>

    <script>
        // 랜덤 닉네임
        const adjectives = ['빠른','느린','용감한','겁쟁이','졸린','배고픈','신나는','멈출수없는','터보','무적의','전설의','미친','조용한','시끄러운','날쌘'];
        const nouns = ['거북이','치타','달팽이','레이서','드라이버','번개','로켓','바람','고양이','판다','독수리','상어','여우','늑대','곰'];
        function randomNickname() {
            return adjectives[Math.floor(Math.random() * adjectives.length)]
                 + nouns[Math.floor(Math.random() * nouns.length)];
        }

        let savedName = localStorage.getItem('race-nickname');
        if (!savedName) {
            savedName = randomNickname();
            localStorage.setItem('race-nickname', savedName);
        }
        document.getElementById('name-input').value = savedName;
        document.getElementById('name-input').addEventListener('input', (e) => {
            localStorage.setItem('race-nickname', e.target.value);
        });

        // 개인 최고 점수
        let personalBest = parseInt(localStorage.getItem('race-best') || '0');
        document.getElementById('ui-best').innerText = personalBest;

        // 모바일 감지 및 터치 힌트
        const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 600;
        if (isMobile) document.getElementById('touch-hint').style.display = 'block';

        // Three.js 씬
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x78d7ff);
        scene.fog = new THREE.Fog(0x78d7ff, 16, 72);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x78d7ff, 1);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x5e8d68, 0.85));
        scene.add(new THREE.AmbientLight(0xffffff, 0.28));
        const dLight = new THREE.DirectionalLight(0xffffff, 1);
        dLight.position.set(5, 10, 5);
        scene.add(dLight);

        const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 1000),
            new THREE.MeshLambertMaterial({ color: 0x4b5158 })
        );
        plane.rotation.x = -Math.PI / 2;
        scene.add(plane);

        const sceneryObjects = [];
        const laneMarkers = [];

        const grassMat = new THREE.MeshLambertMaterial({ color: 0x39c87a });
        [-18, 18].forEach(x => {
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(16, 1000), grassMat);
            grass.rotation.x = -Math.PI / 2;
            grass.position.set(x, -0.01, 0);
            scene.add(grass);
        });

        const curbMats = [
            new THREE.MeshLambertMaterial({ color: 0xffffff }),
            new THREE.MeshLambertMaterial({ color: 0xff4d6d })
        ];
        for (let z = -90; z < 40; z += 8) {
            [-10.2, 10.2].forEach((x, sideIndex) => {
                const curb = new THREE.Mesh(
                    new THREE.BoxGeometry(0.55, 0.1, 4),
                    curbMats[(Math.floor((z + 90) / 8) + sideIndex) % 2]
                );
                curb.position.set(x, 0.04, z);
                scene.add(curb);
                sceneryObjects.push(curb);
            });
        }

        for (let z = -90; z < 40; z += 10) {
            [-2, 2].forEach(x => {
                const marker = new THREE.Mesh(
                    new THREE.BoxGeometry(0.18, 0.035, 4.4),
                    new THREE.MeshLambertMaterial({ color: 0xf7f2b7 })
                );
                marker.position.set(x, 0.035, z);
                scene.add(marker);
                laneMarkers.push(marker);
            });
        }

        function makeSign(color, textColor, x, z, label) {
            const sign = new THREE.Group();
            const postMat = new THREE.MeshLambertMaterial({ color: 0x2d3542 });
            const boardMat = new THREE.MeshLambertMaterial({ color });
            const board = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.15, 0.16), boardMat);
            board.position.y = 2.8;
            const post = new THREE.Mesh(new THREE.BoxGeometry(0.16, 2.8, 0.16), postMat);
            post.position.y = 1.4;
            const stripe = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.16, 0.18), new THREE.MeshLambertMaterial({ color: textColor }));
            stripe.position.y = 2.9;
            sign.add(post, board, stripe);
            sign.position.set(x, 0, z);
            sign.rotation.y = x > 0 ? -0.45 : 0.45;
            sign.userData.label = label;
            scene.add(sign);
            sceneryObjects.push(sign);
        }

        for (let z = -85; z < 30; z += 22) {
            makeSign(0x23d5ff, 0xffffff, -13, z, 'boost');
            makeSign(0xffd166, 0x222222, 13, z - 10, 'item');
        }

        function buildCybertruck() {
            const g = new THREE.Group();
            const silver = new THREE.MeshLambertMaterial({ color: 0x7A8A92 });
            const dark   = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const glass  = new THREE.MeshLambertMaterial({ color: 0x1a3a5a, transparent: true, opacity: 0.85 });
            const white  = new THREE.MeshLambertMaterial({ color: 0xffffff });
            const red    = new THREE.MeshLambertMaterial({ color: 0x111111 });

            const add = (geo, mat, x, y, z, rx=0) => {
                const m = new THREE.Mesh(geo, mat);
                m.position.set(x, y, z);
                m.rotation.x = rx;
                g.add(m);
            };

            add(new THREE.BoxGeometry(2, 0.3, 4),           silver, 0, 0.15,  0);
            add(new THREE.BoxGeometry(1.9, 0.05, 1.9),      silver, 0, 0.54, -1.05, 0.26);
            add(new THREE.BoxGeometry(1.85, 0.58, 1.65),    silver, 0, 0.89, -0.7);
            add(new THREE.BoxGeometry(1.58, 0.46, 0.06),    glass,  0, 0.87, -1.54, 0.1);
            add(new THREE.BoxGeometry(0.07, 0.27, 1.55),    silver, -0.96, 0.44, 1.1);
            add(new THREE.BoxGeometry(0.07, 0.27, 1.55),    silver,  0.96, 0.44, 1.1);
            add(new THREE.BoxGeometry(1.85, 0.27, 0.07),    silver, 0, 0.44, 1.92);
            add(new THREE.BoxGeometry(1.75, 0.045, 0.045),  white,  0, 0.4, -2.01);
            add(new THREE.BoxGeometry(1.75, 0.045, 0.045),  red,    0, 0.4,  1.97);

            const wGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.2, 16);
            [[-1.1,-1.3],[1.1,-1.3],[-1.1,1.3],[1.1,1.3]].forEach(([x,z]) => {
                const w = new THREE.Mesh(wGeo, dark);
                w.rotation.z = Math.PI / 2;
                w.position.set(x, 0.1, z);
                g.add(w);
            });

            g.position.y = 0.33;
            return g;
        }

        function buildBarbieCar() {
            const g = new THREE.Group();
            const pink      = new THREE.MeshLambertMaterial({ color: 0xFF69B4 });
            const darkPink  = new THREE.MeshLambertMaterial({ color: 0xC2185B });
            const chrome    = new THREE.MeshLambertMaterial({ color: 0xE8E8E8 });
            const dark      = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const interior  = new THREE.MeshLambertMaterial({ color: 0xFF1493 });
            const red       = new THREE.MeshLambertMaterial({ color: 0xff2200 });
            const white     = new THREE.MeshLambertMaterial({ color: 0xffffff });

            // 차체 메인
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.38, 4.2), pink);
            body.position.y = 0.19;
            g.add(body);

            // 앞 범퍼 / 후드 (살짝 낮게)
            const frontHood = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.28, 1.4), pink);
            frontHood.position.set(0, 0.45, -1.5);
            g.add(frontHood);

            // 뒤 트렁크
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.28, 0.8), pink);
            trunk.position.set(0, 0.45, 1.65);
            g.add(trunk);

            // 실내 (오픈탑이라 안이 보임)
            const cockpit = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.2, 1.8), interior);
            cockpit.position.set(0, 0.48, -0.1);
            g.add(cockpit);

            // 앞유리 프레임만 (컨버터블)
            const wsFrame = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.35, 0.07), chrome);
            wsFrame.rotation.x = -0.2;
            wsFrame.position.set(0, 0.67, -0.95);
            g.add(wsFrame);

            // 테일핀 왼쪽
            const finL = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.35, 0.6), pink);
            finL.position.set(-1.05, 0.62, 1.6);
            g.add(finL);
            // 테일핀 오른쪽
            const finR = finL.clone();
            finR.position.x = 1.05;
            g.add(finR);

            // 크롬 범퍼 앞
            const bumperF = new THREE.Mesh(new THREE.BoxGeometry(2.15, 0.12, 0.08), chrome);
            bumperF.position.set(0, 0.22, -2.12);
            g.add(bumperF);

            // 크롬 범퍼 뒤
            const bumperR = new THREE.Mesh(new THREE.BoxGeometry(2.15, 0.12, 0.08), chrome);
            bumperR.position.set(0, 0.22, 2.12);
            g.add(bumperR);

            // 헤드라이트 (동그란 느낌 - 작은 박스 2개)
            [[-0.6], [0.6]].forEach(([x]) => {
                const hl = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.18, 0.06), white);
                hl.position.set(x, 0.38, -2.12);
                g.add(hl);
            });

            // 테일라이트
            [[-0.65], [0.65]].forEach(([x]) => {
                const tl = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.14, 0.06), red);
                tl.position.set(x, 0.38, 2.12);
                g.add(tl);
            });

            // 바퀴 (크롬 휠캡)
            const wGeo  = new THREE.CylinderGeometry(0.34, 0.34, 0.22, 16);
            const hubGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.24, 16);
            [[-1.15,-1.35],[1.15,-1.35],[-1.15,1.35],[1.15,1.35]].forEach(([x,z]) => {
                const w = new THREE.Mesh(wGeo, dark);
                w.rotation.z = Math.PI / 2;
                w.position.set(x, 0.1, z);
                g.add(w);
                const hub = new THREE.Mesh(hubGeo, chrome);
                hub.rotation.z = Math.PI / 2;
                hub.position.set(x, 0.1, z);
                g.add(hub);
            });

            g.position.y = 0.33;
            return g;
        }

        function buildCatTruck() {
            const g = new THREE.Group();
            const bodyMat  = new THREE.MeshLambertMaterial({ color: 0x8899AA });
            const dark     = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const glass    = new THREE.MeshLambertMaterial({ color: 0x4488BB, transparent: true, opacity: 0.7 });
            const white    = new THREE.MeshLambertMaterial({ color: 0xffffff });
            const rubber   = new THREE.MeshLambertMaterial({ color: 0x333333 });

            // 박스형 바디 (높이 줄임)
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.82, 3.8), bodyMat);
            body.position.y = 0.41;
            g.add(body);

            // 앞유리
            const ws = new THREE.Mesh(new THREE.BoxGeometry(1.72, 0.42, 0.07), glass);
            ws.position.set(0, 0.68, -1.83);
            g.add(ws);

            // 뒷유리
            const rw = new THREE.Mesh(new THREE.BoxGeometry(1.72, 0.35, 0.07), glass);
            rw.position.set(0, 0.65, 1.83);
            g.add(rw);

            // 사이드 윈도우
            [-1.01, 1.01].forEach(x => {
                const sw = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.32, 1.1), glass);
                sw.position.set(x, 0.68, -0.3);
                g.add(sw);
            });

            // 헤드라이트
            const accent = new THREE.MeshLambertMaterial({ color: 0xFF6B00 });
            [[-0.55], [0.55]].forEach(([x]) => {
                const ring = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.35, 0.05), accent);
                ring.position.set(x, 0.38, -1.89);
                g.add(ring);
                const inner = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.28, 0.06), white);
                inner.position.set(x, 0.38, -1.89);
                g.add(inner);
            });

            // 범퍼
            const bumperF = new THREE.Mesh(new THREE.BoxGeometry(2.05, 0.15, 0.07), rubber);
            bumperF.position.set(0, 0.16, -1.91);
            g.add(bumperF);
            const bumperR = new THREE.Mesh(new THREE.BoxGeometry(2.05, 0.15, 0.07), rubber);
            bumperR.position.set(0, 0.16, 1.91);
            g.add(bumperR);

            // 바퀴
            const wGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 14);
            const hubGeo = new THREE.CylinderGeometry(0.14, 0.14, 0.22, 14);
            const hubMat = new THREE.MeshLambertMaterial({ color: 0xcccccc });
            [[-1.05,-1.2],[1.05,-1.2],[-1.05,1.2],[1.05,1.2]].forEach(([x,z]) => {
                const w = new THREE.Mesh(wGeo, dark);
                w.rotation.z = Math.PI / 2;
                w.position.set(x, 0.1, z);
                g.add(w);
                const hub = new THREE.Mesh(hubGeo, hubMat);
                hub.rotation.z = Math.PI / 2;
                hub.position.set(x, 0.1, z);
                g.add(hub);
            });

            // 🐱 치즈냥이
            const catOrange  = new THREE.MeshLambertMaterial({ color: 0xF5A623 });
            const catStripe  = new THREE.MeshLambertMaterial({ color: 0xC8791A });
            const catPink    = new THREE.MeshLambertMaterial({ color: 0xFFB6C1 });
            const catBlack   = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const catWhite   = new THREE.MeshLambertMaterial({ color: 0xffffff });

            const cat = new THREE.Group();

            // 몸통
            const catBody = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.38, 0.65), catOrange);
            catBody.position.y = 0;
            cat.add(catBody);

            // 줄무늬
            [-0.15, 0.1].forEach(z => {
                const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.54, 0.4, 0.07), catStripe);
                stripe.position.set(0, 0, z);
                cat.add(stripe);
            });

            // 머리
            const catHead = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.42, 0.44), catOrange);
            catHead.position.set(0, 0.38, -0.18);
            cat.add(catHead);

            // 귀
            [[-0.14], [0.14]].forEach(([x]) => {
                const ear = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.16, 0.1), catOrange);
                ear.position.set(x, 0.65, -0.18);
                cat.add(ear);
                const earIn = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.09, 0.11), catPink);
                earIn.position.set(x, 0.65, -0.18);
                cat.add(earIn);
            });

            // 눈
            [[-0.11], [0.11]].forEach(([x]) => {
                const eye = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.07, 0.06), catBlack);
                eye.position.set(x, 0.41, -0.41);
                cat.add(eye);
                const shine = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.03, 0.07), catWhite);
                shine.position.set(x + 0.02, 0.43, -0.41);
                cat.add(shine);
            });

            // 코
            const nose = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.05, 0.06), catPink);
            nose.position.set(0, 0.35, -0.41);
            cat.add(nose);

            // 수염 (얇은 박스)
            [[-0.22, -0.06], [0.22, -0.06], [-0.24, 0.0], [0.24, 0.0]].forEach(([x, z]) => {
                const whisker = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.015, 0.015), catWhite);
                whisker.position.set(x, 0.35, -0.41);
                cat.add(whisker);
            });

            // 꼬리
            const tail1 = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.09, 0.38), catOrange);
            tail1.rotation.x = 0.5;
            tail1.position.set(0.28, 0.05, 0.38);
            cat.add(tail1);
            const tail2 = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.25, 0.09), catOrange);
            tail2.position.set(0.28, 0.22, 0.55);
            cat.add(tail2);

            // 앞발
            [[-0.16], [0.16]].forEach(([x]) => {
                const paw = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.1, 0.18), catOrange);
                paw.position.set(x, -0.22, -0.26);
                cat.add(paw);
            });

            cat.scale.set(0.6, 0.6, 0.6);
            cat.position.set(0, 0.85, -0.2);
            g.add(cat);

            g.position.y = 0.33;
            return g;
        }

        const carBuilders = [buildCybertruck, buildBarbieCar, buildCatTruck];
        const car = carBuilders[Math.floor(Math.random() * carBuilders.length)]();
        scene.add(car);

        let obstacles = [];
        let score = 0;
        let speed = 0.3;
        let isGameOver = false;
        let isConfused = false;
        let finalScore = 0;
        let scoreSubmitted = false;
        let sessionId = null;
        let toastTimer = null;
        const fireworks = [];
        const itemInfo = {
            firework: {
                title: '폭죽 아이템!',
                desc: '앞쪽 장애물을 폭죽으로 날려요',
                className: 'firework',
                color: 0xffd166
            },
            confuse: {
                title: '반전 아이템!',
                desc: '3초 동안 좌우 조작이 뒤집혀요',
                className: 'confuse',
                color: 0xae5bff
            }
        };

        function showItemToast(type) {
            const info = itemInfo[type];
            const toast = document.getElementById('item-toast');
            document.getElementById('item-toast-title').innerText = info.title;
            document.getElementById('item-toast-desc').innerText = info.desc;
            toast.className = `${info.className} show`;
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.className = info.className;
            }, 1700);
        }

        function createItemMesh(type) {
            const info = itemInfo[type];
            const group = new THREE.Group();
            const core = new THREE.Mesh(
                new THREE.IcosahedronGeometry(0.58, 0),
                new THREE.MeshLambertMaterial({ color: info.color, emissive: info.color, emissiveIntensity: 0.28 })
            );
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.78, 0.08, 10, 28),
                new THREE.MeshLambertMaterial({ color: 0xffffff, emissive: info.color, emissiveIntensity: 0.35 })
            );
            const halo = new THREE.Mesh(
                new THREE.TorusGeometry(1.02, 0.045, 8, 28),
                new THREE.MeshLambertMaterial({ color: info.color, transparent: true, opacity: 0.78 })
            );
            ring.rotation.x = Math.PI / 2;
            halo.rotation.y = Math.PI / 2;
            group.add(core, ring, halo);
            group.userData = { type, isItem: true };
            return group;
        }

        function createFireworkBurst(x, y, z) {
            const palette = [0xffd166, 0xef476f, 0x06d6a0, 0x23d5ff, 0xffffff];
            for (let i = 0; i < 34; i++) {
                const color = palette[i % palette.length];
                const particle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.075, 8, 8),
                    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 })
                );
                const angle = Math.random() * Math.PI * 2;
                const lift = Math.random() * Math.PI;
                const force = 0.08 + Math.random() * 0.12;
                particle.position.set(x, y, z);
                particle.userData = {
                    velocity: new THREE.Vector3(
                        Math.cos(angle) * Math.sin(lift) * force,
                        Math.cos(lift) * force + 0.09,
                        Math.sin(angle) * Math.sin(lift) * force
                    ),
                    life: 1
                };
                scene.add(particle);
                fireworks.push(particle);
            }
        }

        function updateFireworks() {
            for (let i = fireworks.length - 1; i >= 0; i--) {
                const p = fireworks[i];
                p.position.add(p.userData.velocity);
                p.userData.velocity.y -= 0.006;
                p.userData.life -= 0.018;
                p.material.opacity = Math.max(0, p.userData.life);
                p.scale.multiplyScalar(0.992);
                if (p.userData.life <= 0) {
                    scene.remove(p);
                    fireworks.splice(i, 1);
                }
            }
        }

        function applyItemEffect(type, position) {
            showItemToast(type);
            createFireworkBurst(position.x, 2.2, position.z + 1.2);

            if (type === 'firework') {
                createFireworkBurst(position.x - 1.1, 2.8, position.z);
                createFireworkBurst(position.x + 1.1, 2.8, position.z);
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    if (!obs.userData.isItem && obs.position.z < 8 && obs.position.z > -42) {
                        createFireworkBurst(obs.position.x, 1.6, obs.position.z);
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                    }
                }
                return;
            }

            if (type === 'confuse') {
                isConfused = true;
                document.getElementById('status-msg').style.display = 'block';
                setTimeout(() => {
                    isConfused = false;
                    document.getElementById('status-msg').style.display = 'none';
                }, 3000);
            }
        }

        function updateScenery() {
            [...sceneryObjects, ...laneMarkers].forEach(obj => {
                obj.position.z += speed * 0.92;
                if (obj.position.z > 24) obj.position.z -= 132;
            });
        }

        // 게임 시작 시 세션 발급
        fetch('/api/session', { method: 'POST' })
            .then(r => r.json())
            .then(d => { sessionId = d.sessionId; })
            .catch(() => {});

        // 키보드 조작
        const keys = { ArrowLeft: false, ArrowRight: false };
        document.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) { keys[e.key] = true; e.preventDefault(); } });
        document.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // 터치 조작
        const touch = { left: false, right: false };
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (isGameOver) return;
            e.preventDefault();
            for (const t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) touch.left = true;
                else touch.right = true;
            }
        }, { passive: false });
        renderer.domElement.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (const t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) touch.left = false;
                else touch.right = false;
            }
        }, { passive: false });

        function createObstacle() {
            if (isGameOver) return;
            let obstacle;
            const rand = Math.random();
            if (rand < 0.14) {
                obstacle = createItemMesh('firework');
            } else if (rand < 0.28) {
                obstacle = createItemMesh('confuse');
            } else {
                obstacle = new THREE.Mesh(
                    new THREE.BoxGeometry(2, 1, 2),
                    new THREE.MeshLambertMaterial({ color: 0xff4757 })
                );
            }

            if (rand >= 0.28 && rand < 0.46) {
                obstacle.material.color.setHex(0x800080);
                obstacle.userData = { type: 'guided' };
            } else if (!obstacle.userData.type) {
                obstacle.userData = { type: 'normal' };
            }
            const lanes = [-4, 0, 4];
            obstacle.position.set(lanes[Math.floor(Math.random() * lanes.length)], obstacle.userData.isItem ? 1.15 : 0.5, -60);
            scene.add(obstacle);
            obstacles.push(obstacle);
            setTimeout(createObstacle, Math.random() * 760 + 380);
        }

        createObstacle();

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            let moveDir = 0;
            if (keys.ArrowLeft || touch.left) moveDir = -1;
            if (keys.ArrowRight || touch.right) moveDir = 1;
            if (isConfused) moveDir *= -1;

            car.position.x = Math.max(-4, Math.min(4, car.position.x + moveDir * 0.2));

            score += 1;
            const displayScore = Math.floor(score / 10);
            const speedLevel = Math.floor((speed - 0.3) / 0.05) + 1;

            document.getElementById('score').innerText = displayScore;
            document.getElementById('ui-speed').innerText = Math.min(speedLevel, 99);
            speed += 0.0001;
            updateScenery();
            updateFireworks();

            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                obs.position.z += speed;

                if (obs.userData.type === 'guided') {
                    obs.position.x += (car.position.x - obs.position.x) * 0.015;
                }

                if (obs.userData.isItem) {
                    obs.rotation.y += 0.075;
                    obs.rotation.x += 0.025;
                    obs.position.y = 1.15 + Math.sin(score * 0.05 + i) * 0.18;
                }

                if (Math.abs(car.position.x - obs.position.x) < 2 && Math.abs(car.position.z - obs.position.z) < 3) {
                    if (obs.userData.isItem) {
                        const hitPosition = obs.position.clone();
                        scene.remove(obs); obstacles.splice(i, 1); i--;
                        applyItemEffect(obs.userData.type, hitPosition);
                        continue;
                    } else {
                        triggerGameOver();
                        return;
                    }
                }

                if (obs.position.z > 10) { scene.remove(obs); obstacles.splice(i, 1); i--; }
            }

            renderer.render(scene, camera);
        }

        animate();

        function triggerGameOver() {
            isGameOver = true;
            finalScore = Math.floor(score / 10);
            document.getElementById('final-score').innerText = finalScore;

            const notice = document.getElementById('personal-best-notice');
            if (finalScore > personalBest) {
                personalBest = finalScore;
                localStorage.setItem('race-best', personalBest);
                document.getElementById('ui-best').innerText = personalBest;
                notice.innerText = '🎉 신기록!';
                notice.className = 'new-record';
            } else {
                notice.innerText = `개인 최고: ${personalBest}점`;
                notice.className = '';
            }

            document.getElementById('game-over').style.display = 'block';
            loadRanking();
        }

        async function loadRanking(highlightName = null) {
            const list = document.getElementById('ranking-list');
            try {
                const res = await fetch('/api/scores');
                const data = await res.json();

                if (!data.length) {
                    list.innerHTML = '<li style="text-align:center;color:#666;padding:10px;">아직 기록이 없어요!</li>';
                    return;
                }

                list.innerHTML = data.map((entry, i) => {
                    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}.`;
                    const isMe = highlightName && entry.name === highlightName;
                    return `<li class="${isMe ? 'my-score' : ''}">
                        <span class="rank-pos">${medal}</span>
                        <span class="rank-name">${entry.name}</span>
                        <span class="rank-score">${entry.score.toLocaleString()}</span>
                    </li>`;
                }).join('');
            } catch (e) {
                list.innerHTML = '<li style="text-align:center;color:#666;padding:10px;">랭킹을 불러올 수 없어요.</li>';
            }
        }

        async function submitScore() {
            if (scoreSubmitted) return;
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('submit-msg');
            const name = document.getElementById('name-input').value.trim();

            if (!name) { document.getElementById('name-input').focus(); return; }

            btn.disabled = true;
            btn.innerText = '등록 중...';
            msg.innerText = '';

            try {
                const res = await fetch('/api/scores', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, score: finalScore, sessionId })
                });
                const result = await res.json();

                if (!res.ok) {
                    msg.innerText = result.error || '오류가 발생했습니다.';
                    btn.disabled = false; btn.innerText = '등록';
                    return;
                }

                scoreSubmitted = true;
                btn.innerText = '등록 완료 ✓';

                if (!result.updated) {
                    msg.innerText = `기존 최고 점수(${result.best}점)가 더 높아요.`;
                } else {
                    msg.innerText = '등록됐어요!';
                }

                // 내 순위 표시
                const rankRes = await fetch(`/api/rank/${encodeURIComponent(name)}`);
                const rankData = await rankRes.json();
                if (rankData.rank > 0) {
                    const banner = document.getElementById('my-rank-banner');
                    banner.style.display = 'block';
                    banner.innerText = `🏅 현재 ${rankData.rank}위 / 전체 ${rankData.total}명`;
                }

                await loadRanking(name);
            } catch (e) {
                msg.innerText = '서버에 연결할 수 없습니다.';
                btn.disabled = false; btn.innerText = '등록';
            }
        }

        document.getElementById('name-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitScore();
        });

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
